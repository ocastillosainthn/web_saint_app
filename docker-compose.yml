version: '3.8'

services:
  web:
    build: .
    image: saint-web-app:latest
    networks:
      - saint_sainthn_default
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.saint-router.rule=Host(`saint.sainthn.com`)"
        - "traefik.http.routers.saint-router.entrypoints=web"
        - "traefik.http.services.saint-service.loadbalancer.server.port=80"

networks:
  saint_sainthn_default:
    external: true
