version: '3.8'

services:
  mi-sitio-saint:
    image: nginx:alpine
    networks:
      - saint_sainthn_default # Usamos la red que ya creó tu propio stack
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.saint-router.rule=Host(`saint.sainthn.com`)"
        - "traefik.http.services.saint-service.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure
    volumes:
      - ./:/usr/share/nginx/html:ro

networks:
  saint_sainthn_default:
    external: true
