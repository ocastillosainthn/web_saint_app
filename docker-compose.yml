version: '3.8'

services:
  mi-sitio-saint:
    image: nginx:alpine
    # NO usamos "ports", Traefik se encarga
    networks:
      - traefik_network # Asegúrate de que este sea el nombre de la red de tu Traefik
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.saint.rule=Host(`saint.sainthn.com`)"
        - "traefik.http.services.saint.loadbalancer.server.port=80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    restart: always

networks:
  traefik_network:
    external: true
